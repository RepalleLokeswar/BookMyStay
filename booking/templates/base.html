<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BOOK MY Stay{% endblock %} | Premium Booking</title>
    <meta name="description" content="Experience luxury stays with BOOK MY Stay. Seamless booking, incredible destinations.">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <nav class="navbar">
        <a href="{% url 'home' %}" class="logo">BOOK MY Stay</a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'my_bookings' %}">My Bookings</a>
                <span style="color: var(--text-muted);">Welcome, {{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn-outline">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}" class="btn btn-primary">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        &copy; 2026 BOOK MY Stay. All rights reserved. Designed for excellence.
    </footer>

</body>
</html>
